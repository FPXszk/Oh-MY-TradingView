name: Daily Fundamental Screener

on:
  schedule:
    - cron: '0 3 * * *'   # JST 12:00 = UTC 03:00
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --silent

      - name: Run fundamental screener
        run: node scripts/screener/run-fundamental-screening.mjs

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-report-${{ github.run_id }}
          path: docs/reports/screener/daily-ranking.md
          if-no-files-found: warn
