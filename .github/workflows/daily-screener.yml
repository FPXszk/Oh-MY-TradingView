name: Daily Fundamental Screener

on:
  workflow_dispatch:

jobs:
  run-screener:
    runs-on:
      - self-hosted
      - windows

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --silent

      - name: Run fundamental screener
        run: node scripts/screener/run-fundamental-screening.mjs

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-report-${{ github.run_id }}
          path: docs/reports/screener/daily-ranking.md
          if-no-files-found: warn
