name: Night Batch Self Hosted

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      config_path:
        description: JSON config path relative to the repository root
        required: true
        default: config/night_batch/bundle-foreground-reuse-config.json

jobs:
  start-night-batch:
    runs-on:
      - self-hosted
      - windows
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Evaluate schedule freshness
        id: freshness
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $shouldRun = 'true'
          if ('${{ github.event_name }}' -eq 'schedule') {
            $jst = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId([DateTimeOffset]::UtcNow, 'Tokyo Standard Time')
            if ($jst.Hour -ne 0) {
              Write-Host "Skipping stale scheduled run at $($jst.ToString('yyyy-MM-dd HH:mm:ss zzz'))"
              $shouldRun = 'false'
            }
          }
          "should_run=$shouldRun" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install dependencies in WSL workspace
        if: steps.freshness.outputs.should_run == 'true'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%I in (`wsl.exe wslpath -a "%CD%"`) do set "REPO_WSL=%%I"
          if not defined REPO_WSL exit /b 1
          wsl.exe bash -lc "cd \"%REPO_WSL%\" && npm ci --silent"

      - name: Record live checkout baseline
        if: steps.freshness.outputs.should_run == 'true'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          & scripts/windows/github-actions/write-night-batch-live-checkout-baseline.ps1 -RunId 'gha_${{ github.run_id }}_${{ github.run_attempt }}' -RunAttempt '${{ github.run_attempt }}' -BundleConfigPath '${{ inputs.config_path }}'

      - name: Ensure TradingView is running
        if: steps.freshness.outputs.should_run == 'true'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $configPath = Join-Path $PWD '${{ inputs.config_path }}'
          $config = Get-Content -Raw -Path $configPath | ConvertFrom-Json
          $runtime = $config.runtime
          $launch = $config.launch
          if (-not $runtime -or -not $launch) {
            throw "Config is missing runtime or launch sections: $configPath"
          }

          $startupUrl = "http://$($runtime.startup_check_host):$($runtime.startup_check_port)/json/list"
          $alreadyRunning = $false
          try {
            $response = Invoke-WebRequest -UseBasicParsing -Uri $startupUrl -TimeoutSec 3
            if ($response.Content -match 'tradingview' -and $response.Content -match '/chart') {
              $alreadyRunning = $true
              Write-Host "[diag] TradingView already reachable at $startupUrl"
            }
          } catch {
            Write-Host "[diag] TradingView not reachable at $startupUrl; launching shortcut"
          }

          if (-not $alreadyRunning) {
            if ($launch.shortcut_path -and (Test-Path $launch.shortcut_path)) {
              Start-Process -FilePath $launch.shortcut_path
            } else {
              $shortcut = $null
              $shortcutDir = Split-Path -Parent $launch.shortcut_path
              if ($shortcutDir -and (Test-Path $shortcutDir)) {
                $shortcut = Get-ChildItem -Path $shortcutDir -Filter '*.lnk' -File |
                  Where-Object { $_.Name -match 'TradingView' } |
                  Select-Object -First 1 -ExpandProperty FullName
              }

              if ($shortcut) {
                Start-Process -FilePath $shortcut
                Start-Sleep -Seconds $runtime.launch_wait_sec
                return
              }

              $launcher = Join-Path $env:LOCALAPPDATA 'TradingView\TradingView.exe'
              if (-not (Test-Path $launcher)) {
                throw "No TradingView launcher found at $launcher, $($launch.shortcut_path), or any TradingView shortcut in $shortcutDir"
              }
              Start-Process -FilePath $launcher -ArgumentList "--remote-debugging-port=$($runtime.startup_check_port)"
            }
            Start-Sleep -Seconds $runtime.launch_wait_sec
          }

      - name: Run smoke gate and foreground production
        if: steps.freshness.outputs.should_run == 'true'
        shell: cmd
        run: |
          set "NIGHT_BATCH_CONFIG=${{ inputs.config_path }}"
          set "NIGHT_BATCH_RUN_ID=gha_${{ github.run_id }}_${{ github.run_attempt }}"
          if defined NIGHT_BATCH_LIVE_CHECKOUT_BASELINE_PATH (
            echo [diag] live_checkout_baseline=%NIGHT_BATCH_LIVE_CHECKOUT_BASELINE_PATH%
          )
          if "%NIGHT_BATCH_CONFIG%"=="" (
            if "${{ github.event_name }}"=="workflow_dispatch" (
              echo [diag] ERROR: workflow_dispatch requires a non-empty config_path
              exit /b 1
            )
            set "NIGHT_BATCH_CONFIG=config/night_batch/bundle-foreground-reuse-config.json"
          )
          for /f "usebackq delims=" %%I in (`wsl.exe wslpath -a "%CD%"`) do set "REPO_WSL=%%I"
          if not defined REPO_WSL exit /b 1
          echo [diag] config_path=%NIGHT_BATCH_CONFIG%
          echo [diag] night_batch_run_id=%NIGHT_BATCH_RUN_ID%
          echo [diag] CD=%CD%
          if not exist "%NIGHT_BATCH_CONFIG%" (
            echo [diag] WARNING: config file not found at %NIGHT_BATCH_CONFIG%
          )
          wsl.exe bash -lc "cd \"%REPO_WSL%\" && python3 -c \"import json, sys; data = json.load(open(sys.argv[1], encoding='utf-8')); detach = data.get('runtime', {}).get('detach_after_smoke'); sys.exit(0 if detach is not True else 9)\" \"%NIGHT_BATCH_CONFIG%\""
          set "CONFIG_CHECK_EXIT=%ERRORLEVEL%"
          if "%CONFIG_CHECK_EXIT%"=="9" (
            echo [diag] ERROR: workflow requires runtime.detach_after_smoke=false in %NIGHT_BATCH_CONFIG%
            exit /b 1
          )
          if not "%CONFIG_CHECK_EXIT%"=="0" (
            echo [diag] ERROR: failed to validate night batch config %NIGHT_BATCH_CONFIG%
            exit /b %CONFIG_CHECK_EXIT%
          )
          scripts\windows\run-night-batch-self-hosted.cmd "%NIGHT_BATCH_CONFIG%"
          set "BATCH_EXIT=%ERRORLEVEL%"
          echo [diag] wrapper exit code=%BATCH_EXIT%
          exit /b %BATCH_EXIT%

      - name: Locate night batch outputs
        if: always() && steps.freshness.outputs.should_run == 'true'
        id: night_batch_outputs
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          & scripts/windows/github-actions/find-night-batch-outputs.ps1 -ExpectedRunId 'gha_${{ github.run_id }}_${{ github.run_attempt }}'

      - name: Append night batch workflow summary
        if: always() && steps.freshness.outputs.should_run == 'true'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          & scripts/windows/github-actions/append-night-batch-workflow-summary.ps1 -SummaryJsonPath '${{ steps.night_batch_outputs.outputs.summary_json }}' -SummaryMdPath '${{ steps.night_batch_outputs.outputs.summary_md }}' -RichReportPath '${{ steps.night_batch_outputs.outputs.rich_report }}' -RankingArtifactPath '${{ steps.night_batch_outputs.outputs.ranking_artifact }}' -ProtectionReportPath '${{ steps.night_batch_outputs.outputs.protection_report }}'

      - name: Upload night batch artifacts
        if: always() && steps.freshness.outputs.should_run == 'true' && steps.night_batch_outputs.outputs.round_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: night-batch-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.night_batch_outputs.outputs.round_dir }}
          if-no-files-found: warn

      - name: Archive completed night batch rounds
        if: always() && steps.freshness.outputs.should_run == 'true'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%I in (`wsl.exe wslpath -a "%CD%"`) do set "REPO_WSL=%%I"
          if not defined REPO_WSL exit /b 1
          wsl.exe bash -lc "cd \"%REPO_WSL%\" && python3 python/night_batch.py archive-rounds"

      - name: Report skipped stale schedule
        if: steps.freshness.outputs.should_run != 'true'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: Write-Host 'Skipped stale scheduled run outside the 00:00 JST launch window.'
